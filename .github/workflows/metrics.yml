name: Metrics

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          # deixa MUITO mais limpo
          base: header

          # ordem manual dos widgets
          config_order: base.header, isocalendar, languages

          # layout
          config_padding: 0
          config_display: large
          config_timezone: America/Sao_Paulo

          # calendário 3D
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # linguagens
          plugin_languages: yes
          plugin_languages_limit: 2
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_indepth: yes

          # ignorar linguagens lixo
          plugin_languages_ignored: html, css, less, dockerfile, makefile

          # remove excesso visual
          plugin_languages_analysis_timeout: 15
